version: '3.3'  # 사용하는 Docker Compose 파일 버전

services:  # 이 파일에서 정의하는 서비스
  web:  # 서비스 이름, 이 경우 'web'이라고 명명
    build:
      context: .
      dockerfile: ./Dockerfile
      args:  # 같은 폴더의 .env에서 값을 읽어 빌드 시 주입
        DB_URL: ${DB_URL}
        JWT_SECRET: ${JWT_SECRET}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_DATA_API_URL: ${NEXT_PUBLIC_DATA_API_URL}
        NEXT_PUBLIC_PYTHON_URL: ${NEXT_PUBLIC_PYTHON_URL}
    container_name: kyfront-web
    ports:
      - '23010:3000'  # 호스트의 포트와 컨테이너의 포트를 연결
    environment:
      NODE_ENV: production